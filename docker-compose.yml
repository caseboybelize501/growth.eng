version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - llama
      - redis
      - postgres
      - chromadb
    environment:
      - POSTHOG_API_KEY=your_key_here
      - CMS_API_KEY=your_key_here
  llama:
    image: ghcr.io/ggerganov/llama.cpp:latest
    command: ["--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: growth_db
    ports:
      - "5432:5432"
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
